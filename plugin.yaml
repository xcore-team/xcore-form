name: xform
version: 1.0.0
author: xcore contributors
description: Build forms. Launch workflows.
execution_mode: trusted
framework_version: ">=2.0"
entry_point: src/main.py


envconfiguration:
  inject: true
  env_file: .env

requires:
  - name: auth
    version: ">=0.1.0"

env:
  DEFAULT_EXPORT_FORMAT: "xlsx"

# Le stockage de fichiers (upload/download) est délégué à l'extension partagée
# ext.storage (extensions/xstorage) — voir integration.yaml services.extensions.storage.
# xform ne conserve que les métadonnées (XFormFileRecord) en DB.

events_emitted:
  xform.submission:
    description: "Soumission complète avec données, tenant et définition des champs — consommé par xflow"
    payload_schema:
      tenant_id: string
      owner_id: string
      form_id: string
      form_title: string
      form_slug: string
      form_tags: array
      submission_id: string
      submission_data: object
      labeled_data: object
      submitted_at: string
      submitter:
        user_id: string
        ip: string
        user_agent: string
      fields: array

  xform.new_submission:
    description: "Nouvelle soumission reçue (fallback quand XPulse est indisponible)"
    payload_schema:
      form_id: string
      form_title: string
      owner_id: string
      submission_id: string
      submission_data: object

  xform.send_email:
    description: "Demande d'envoi d'email de confirmation au soumetteur"
    payload_schema:
      to: string
      subject: string
      html: string
      context:
        form_id: string
        form_title: string
        submission_id: string

allowed_imports:
  - pydantic
  - sqlalchemy
  - slugify
  - openpyxl
  - uuid
  - hashlib
  - json
  - re
  - datetime
  - pathlib
  - typing
  - dataclasses
  - enum
  - functools
  - itertools
  - collections
  - string
  - asyncio
  - logging

rbac:
  grants:
    - name: xform:forms:read
      description: "Consulter la liste et le détail de ses formulaires"
      tenant_grantable: true
      group: xform

    - name: xform:forms:write
      description: "Créer, modifier et supprimer des formulaires"
      tenant_grantable: true
      group: xform

    - name: xform:submissions:read
      description: "Consulter les soumissions et les analytics d'un formulaire"
      tenant_grantable: true
      group: xform

    - name: xform:submissions:export
      description: "Exporter les soumissions (XLSX, CSV, JSON)"
      tenant_grantable: true
      group: xform

    - name: xform:admin
      description: "Accès complet xform — toutes les opérations sur tous les formulaires"
      tenant_grantable: false
      group: xform

permissions:
  - resource: "db.*"
    actions: ["read", "write"]
    effect: allow
  - resource: "cache.*"
    actions: ["read", "write"]
    effect: allow
  - resource: "xflow.*"
    actions: ["*"]
    effect: allow
  - resource: "xpulse.*"
    actions: ["*"]
    effect: allow
  - resource: "xdesk.*"
    actions: ["*"]
    effect: allow
  - resource: "xflow.integration"
    actions: ['*']
    effect: allow

resources:
  timeout_seconds: 30
  max_memory_mb: 256
  max_disk_mb: 500
  rate_limit:
    calls: 200
    period_seconds: 60

runtime:
  health_check:
    enabled: true
    interval_seconds: 30
    timeout_seconds: 5
  retry:
    max_attempts: 1
    backoff_seconds: 0.0