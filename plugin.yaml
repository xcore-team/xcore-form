name: xform
version: 1.0.0
author: xcore contributors
description: Build forms. Launch workflows.
execution_mode: trusted
framework_version: ">=2.0"
entry_point: src/main.py


envconfiguration:
  inject: true
  env_file: .env

requires:
  - name: auth
    version: ">=0.1.0"

env:
  MAX_FILE_SIZE_MB: "10"
  ALLOWED_FILE_TYPES: "pdf,doc,docx,jpg,jpeg,png,gif,xlsx,csv"
  DEFAULT_EXPORT_FORMAT: "xlsx"

storage:
  backend: supabase     # local | s3 | r2 | supabase
  local:
    path: data/uploads  # relatif au dossier du plugin
  s3:
    bucket: ""
    region: us-east-1
    access_key_id: ""       # ou variable d'env AWS_ACCESS_KEY_ID
    secret_access_key: ""   # ou variable d'env AWS_SECRET_ACCESS_KEY
    prefix: xform/          # préfixe des clés dans le bucket
    endpoint_url: ""        # vide = AWS S3, sinon MinIO/R2/autre
  r2:
    bucket: ""
    account_id: ""          # Cloudflare account ID
    access_key_id: ""
    secret_access_key: ""
    prefix: xform/
  supabase:
    url: ${NEXT_PUBLIC_SUPABASE_URL}                 # https://xxxx.supabase.co
    key: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}                 # service_role key (pas anon key)
    bucket: test
    prefix: uploads/
    public: false           # true si le bucket est public (URLs directes)

events_emitted:
  xform.submission:
    description: "Soumission complète avec données, tenant et définition des champs — consommé par xflow"
    payload_schema:
      tenant_id: string
      owner_id: string
      form_id: string
      form_title: string
      form_slug: string
      form_tags: array
      submission_id: string
      submission_data: object
      labeled_data: object
      submitted_at: string
      submitter:
        user_id: string
        ip: string
        user_agent: string
      fields: array

  xform.new_submission:
    description: "Nouvelle soumission reçue (fallback quand XPulse est indisponible)"
    payload_schema:
      form_id: string
      form_title: string
      owner_id: string
      submission_id: string
      submission_data: object

  xform.send_email:
    description: "Demande d'envoi d'email de confirmation au soumetteur"
    payload_schema:
      to: string
      subject: string
      html: string
      context:
        form_id: string
        form_title: string
        submission_id: string

allowed_imports:
  - pydantic
  - sqlalchemy
  - slugify
  - openpyxl
  - uuid
  - hashlib
  - json
  - re
  - datetime
  - pathlib
  - typing
  - dataclasses
  - enum
  - functools
  - itertools
  - collections
  - string
  - asyncio
  - logging

rbac:
  grants:
    - name: xform:forms:read
      description: "Consulter la liste et le détail de ses formulaires"
      tenant_grantable: true
      group: xform

    - name: xform:forms:write
      description: "Créer, modifier et supprimer des formulaires"
      tenant_grantable: true
      group: xform

    - name: xform:submissions:read
      description: "Consulter les soumissions et les analytics d'un formulaire"
      tenant_grantable: true
      group: xform

    - name: xform:submissions:export
      description: "Exporter les soumissions (XLSX, CSV, JSON)"
      tenant_grantable: true
      group: xform

    - name: xform:admin
      description: "Accès complet xform — toutes les opérations sur tous les formulaires"
      tenant_grantable: false
      group: xform

permissions:
  - resource: "db.*"
    actions: ["read", "write"]
    effect: allow
  - resource: "cache.*"
    actions: ["read", "write"]
    effect: allow
  - resource: "xflow.*"
    actions: ["*"]
    effect: allow
  - resource: "xpulse.*"
    actions: ["*"]
    effect: allow
  - resource: "xdesk.*"
    actions: ["*"]
    effect: allow
  - resource: "xflow.integration"
    actions: ['*']
    effect: allow

resources:
  timeout_seconds: 30
  max_memory_mb: 256
  max_disk_mb: 500
  rate_limit:
    calls: 200
    period_seconds: 60

runtime:
  health_check:
    enabled: true
    interval_seconds: 30
    timeout_seconds: 5
  retry:
    max_attempts: 1
    backoff_seconds: 0.0